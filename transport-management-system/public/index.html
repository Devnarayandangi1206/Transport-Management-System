<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Management System - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <!-- Animated Transport Background -->
    <div class="bg-scene">
        <div class="stars"></div>
        <div class="city-skyline">
            <div class="building b1"></div>
            <div class="building b2"></div>
            <div class="building b3"></div>
            <div class="building b4"></div>
            <div class="building b5"></div>
            <div class="building b6"></div>
            <div class="building b7"></div>
        </div>
        <div class="road">
            <div class="road-line l1"></div>
            <div class="road-line l2"></div>
            <div class="road-line l3"></div>
        </div>
        <!-- Moving Vehicles -->
        <div class="vehicle-anim truck-anim">🚛</div>
        <div class="vehicle-anim bus-anim">🚌</div>
        <div class="vehicle-anim car-anim">🚗</div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">🚛</div>
            <h2>Transport Management</h2>
            <p class="auth-subtitle">Sign in to your admin panel</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@tms.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <p id="authError" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;"></p>
                <button type="submit" class="btn">Login</button>
            </form>
            <div style="margin-top: 1rem; text-align: center; font-size: 0.875rem;">
                Don't have an account? <a href="#" id="toggleRegister" style="color: var(--primary-color);">Register Admin</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
